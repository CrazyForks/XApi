<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="c_bg" x1="0" y1="0" x2="128" y2="128" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#2D8CFF" />
            <stop offset="100%" stop-color="#7C3AED" />
        </linearGradient>
    </defs>

    <!-- 底座铺满整个画布，无空白边框 -->
    <rect x="0" y="0" width="128" height="128" rx="28" fill="url(#c_bg)" />

    <!-- 箭头 X：两组对向箭头，放大占满区域 -->
    <path d="M34 32 L60 64 L34 96" stroke="#FFFFFF" stroke-width="13" stroke-linecap="round" stroke-linejoin="round" fill="none" />
    <path d="M94 32 L68 64 L94 96" stroke="#FFFFFF" stroke-width="13" stroke-linecap="round" stroke-linejoin="round" fill="none" />

    <!-- 中心点：两组箭头汇聚，象征请求交汇 -->
    <circle cx="64" cy="64" r="6" fill="#FFFFFF" />
</svg>
